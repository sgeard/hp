name = "hp"
version = "0.1.0"
license = "license"
author = "sgeard"
maintainer = "geardsj@gmail.com"
copyright = "Copyright 2023, sgeard"

[build]
   auto-executables = true
   auto-tests = true
   auto-examples = true
   module-naming = false

[install]
   library = false

[fortran]
   implicit-typing = false
   implicit-external = false
   source-form = "free"

[dependencies]
avd = { path = "../../autodiff-git" }

# rpn_stack.f90 / rpn_stack_sm.f90 select a non-PDT implementation under
# #ifdef NO_PDT, so the sources must be preprocessed.
[preprocess]
[preprocess.cpp]
   suffixes = ["f90", "F90"]

